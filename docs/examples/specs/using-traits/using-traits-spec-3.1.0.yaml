openapi: 3.1.0
info:
  title: 'Example of using traits in swagger-php'
  version: 1.0.0
paths:
  '/entities/{id}':
    delete:
      tags:
        - Entities
      operationId: deleteEntity
      parameters:
        -
          name: id
          in: path
          description: 'ID of entity to delete'
          required: true
          schema:
            type: string
      responses:
        default:
          description: 'successful operation'
  '/products/{product_id}':
    get:
      tags:
        - Products
      operationId: getProduct
      parameters:
        -
          name: product_id
          in: path
          description: 'ID of product to return'
          required: true
          schema:
            type: string
      responses:
        default:
          description: 'successful operation'
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: '#/components/schemas/SimpleProduct' }
                  - { $ref: '#/components/schemas/Product' }
                  - { $ref: '#/components/schemas/TrickyProduct' }
tags:
  - name: Entities
    description: Entities
  - name: Products
    description: Products
components:
  schemas:
    BellsAndWhistles:
      type: object
      title: 'Bells and Whistles trait'
      allOf:
        -
          type: object
          properties:
            plating:
              description: 'The plating.'
              example: gold
            bell:
              type: string
              description: 'The bell (clashes with Product::bell).'
            whistle:
              type: string
              description: 'The bell.'
        - $ref: '#/components/schemas/Bells'
        - $ref: '#/components/schemas/Whistles'
    CustomName-Blink:
      type: object
      title: 'Blink trait'
      properties:
        frequency:
          type: integer
          description: 'The frequency.'
    Colour:
      type: object
      title: 'Colour trait'
      properties:
        colour:
          type: string
          description: 'The colour.'
    Bells:
      type: object
      title: 'Bells trait'
      properties:
        bell:
          type: string
          description: 'The bell (clashes with Product::bell).'
    Whistles:
      type: object
      title: 'Whistles trait'
      properties:
        whistle:
          type: string
          description: 'The bell.'
    Product:
      type: object
      title: 'Product model'
      allOf:
        -
          type: object
          properties:
            id:
              type: integer
              format: int64
              description: 'The unique identifier of a product in our catalog.'
              example: 1
            bell:
              type: string
              description: 'The product bell.'
              example: gong
            colour:
              type: string
              description: 'The colour.'
            plating:
              description: 'The plating.'
              example: gold
            whistle:
              type: string
              description: 'The bell.'
        - $ref: '#/components/schemas/Colour'
        - $ref: '#/components/schemas/BellsAndWhistles'
    SimpleProduct:
      type: object
      title: 'SimpleProduct model'
      allOf:
        -
          type: object
          properties:
            id:
              type: integer
              format: int64
              description: 'The unique identifier of a simple product in our catalog.'
              example: 1
            bell:
              type: string
              description: 'The bell (clashes with Product::bell).'
        - $ref: '#/components/schemas/Bells'
    TrickyProduct:
      type: object
      title: 'TrickyProduct model'
      allOf:
        -
          type: object
          properties:
            trick:
              type: string
              description: 'The trick.'
              example: 'recite poem'
            frequency:
              type: integer
              description: 'The frequency.'
        - $ref: '#/components/schemas/SimpleProduct'
        - $ref: '#/components/schemas/CustomName-Blink'
