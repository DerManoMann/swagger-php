openapi: 3.1.0
info:
  title: 'Pet Store'
  version: 1.0.0
servers:
  -
    url: 'https://api.example.com/v1'
    description: Production
paths:
  /pets:
    get:
      tags:
        - pets
      summary: 'List all pets'
      operationId: listPets
      parameters:
        -
          name: limit
          in: query
          description: 'How many items to return'
          required: false
          schema:
            type: integer
            format: int32
            maximum: 100
      responses:
        '200':
          description: 'A list of pets'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        default:
          description: 'Unexpected error'
tags:
  -
    name: pets
    description: 'Pet operations'
components:
  schemas:
    Pet:
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          maxLength: 255
        tag:
          type: string
      type: object
